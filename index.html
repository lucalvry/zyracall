<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZyraCall - Call Any Phone Number Worldwide From Your Browser.</title>
    <meta name="description" content="ZyraCall is a browser-based global calling platform. Call real phone numbers worldwide instantly — no apps, no SIM cards. Pay-as-you-go pricing with transparent rates." />
    <meta name="author" content="ZyraCall" />
    <meta name="keywords" content="international calling, browser calling, VoIP, cheap international calls, call abroad, Skype alternative, internet calling" />
    <link rel="canonical" href="https://zyracall.com" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://rixpasynhccgkoumpaan.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://rixpasynhccgkoumpaan.supabase.co" />

    <!-- Open Graph -->
    <meta property="og:title" content="ZyraCall - Browser-Based Global Calling" />
    <meta property="og:description" content="Call any phone number worldwide directly from your browser. No apps, no SIM cards, transparent pay-as-you-go pricing." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://zyracall.com" />
    <meta property="og:image" content="https://zyracall.com/og-image.png" />
    <meta property="og:site_name" content="ZyraCall" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ZyraCall" />
    <meta name="twitter:title" content="ZyraCall - Browser-Based Global Calling" />
    <meta name="twitter:description" content="Call any phone number worldwide directly from your browser. No apps, no SIM cards, transparent pricing." />
    <meta name="twitter:image" content="https://zyracall.com/og-image.png" />

    <!-- Additional SEO -->
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#1F2A44" />
    
    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ZyraCall",
      "url": "https://zyracall.com",
      "logo": "https://zyracall.com/logo.png",
      "description": "Browser-based global calling platform for international phone calls",
      "sameAs": [
        "https://twitter.com/ZyraCall"
      ]
    }
    </script>

    <!-- Structured Data - SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ZyraCall",
      "applicationCategory": "CommunicationApplication",

        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",

        "Real-time cost display during calls",
        "HD VoIP call quality with WebRTC",
        "Call recording with secure storage",
        "Pay-as-you-go pricing with no subscriptions",
        "No app installation required"
      ],
      "about": [
        {
          "@type": "Thing",
          "name": "Voice over IP",
          "sameAs": "https://en.wikipedia.org/wiki/Voice_over_IP"
        },
        {
          "@type": "Thing",
          "name": "International calling",
          "sameAs": "https://en.wikipedia.org/wiki/International_call"
        },
        {
          "@type": "Thing",

          "sameAs": "https://en.wikipedia.org/wiki/WebRTC"
        }
      ]
    }

    <div id="root"></div>
